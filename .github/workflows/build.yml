name: build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install both JDKs: Gradle 8.14 runs on 21, and uses 25 as the
      # Java toolchain to compile/test against the Java 25 paper-api.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - name: Compile + assemble jar
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: ./gradlew assemble --no-daemon "-Porg.gradle.java.installations.paths=${{ env.JAVA_HOME_25_X64 }}"

      - name: Unit tests
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: ./gradlew test --no-daemon "-Porg.gradle.java.installations.paths=${{ env.JAVA_HOME_25_X64 }}"

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: |
            build/reports/tests/test
            build/test-results/test
          if-no-files-found: ignore

      - name: Upload plugin jar
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-jar
          path: build/libs/*.jar

  smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      # Make the JDK 25 toolchain discoverable so the smoke script's
      # `./gradlew assemble` works without passing the -P flag.
      - name: Register JDK 25 toolchain
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.installations.paths=${{ env.JAVA_HOME_25_X64 }}" >> ~/.gradle/gradle.properties

      - name: Functional smoke test (Paper + plugin in Docker)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: ./scripts/smoke-test.sh

  e2e:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            21
            25

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Register JDK 25 toolchain
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.java.installations.paths=${{ env.JAVA_HOME_25_X64 }}" >> ~/.gradle/gradle.properties

      # Mineflayer bot drives the real player input path (swing, bow) — the
      # end-to-end coverage the in-process /fusion test can't reach.
      - name: End-to-end test (Mineflayer bot vs. Paper + plugin)
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}
        run: ./scripts/e2e-test.sh
