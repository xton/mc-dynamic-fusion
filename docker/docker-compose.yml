# Local UAT server: real Paper + the DynamicFusion plugin, joinable from your
# own Minecraft client at localhost:25565. Driven by `make uat`.
#
# Set your Minecraft username in docker/.env (copy docker/.env.example) so you
# are opped on join. The built plugin jar is placed in ./data/plugins by the
# Makefile before this comes up.
services:
  mc:
    image: ${MC_IMAGE:-itzg/minecraft-server:java25}
    container_name: fusion-uat
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "PAPER"
      VERSION: "${MC_VERSION:-26.1.2}"
      ONLINE_MODE: "TRUE"
      MEMORY: "${MC_MEMORY:-2G}"
      OPS: "${MC_USERNAME:-}"
      # Needed for the Lift jetpack: without it, sustained airborne thrust
      # eventually trips the server's anti-fly kick (see JetpackTask's class doc).
      ALLOW_FLIGHT: "TRUE"
      MOTD: "DynamicFusion UAT"
      # ViaVersion lets newer clients (e.g. 26.2) join this 26.1.2 server, so
      # you don't need a client that exactly matches the server version. itzg
      # auto-resolves a build from Modrinth compatible with the server.
      MODRINTH_PROJECTS: "${MC_MODRINTH_PROJECTS:-viaversion}"
      ENABLE_RCON: "TRUE"
      RCON_PASSWORD: "${RCON_PASSWORD:-fusion}"
    volumes:
      - ./data:/data
    restart: "no"
