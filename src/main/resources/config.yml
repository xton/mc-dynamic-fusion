# DynamicFusion configuration.

fusion:
  # Maximum modifiers stored on one item. Technical guard on PDC/loop size,
  # not a balance lever — excess is dropped from the tail.
  max-modifiers: 8
  # Maximum fusion depth (generation). Refused past this.
  max-generation: 5
  # XP-level cost to fuse. Free to start; raise later to add cost.
  cost: 0

# Base swing effect every active fused weapon produces (a shove burst).
effect:
  base-radius: 2.5
  base-power: 1.0
  # Whether the burst affects other players (it's knockback only, no damage).
  affect-players: false
  # Ambient particles shed by a held fused weapon (cosmetic).
  particle-shedding: true
  shed-period-ticks: 4

# NOVA — the canonical all-directions burst.
nova:
  radius: 4.0
  power: 1.4

# EXPAND — widens the radius; stacks per copy.
expand:
  bonus-per-apply: 3.0

# CHAIN — hops to nearby entities beyond the burst; stacks per copy.
chain:
  count-per-apply: 3
  range: 6.0

# REPEAT — fires the effect extra times; stacks per copy.
repeat:
  count-per-apply: 2
  delay-ticks: 4

# DELAYED — holds the effect for a fuse before firing; stacks per copy.
delayed:
  ticks-per-apply: 30

# PERSIST — lingering field that re-pulses the burst; stacks duration.
persist:
  ticks-per-apply: 60
  interval-ticks: 20

# MINING — mining ray that carves an arc of soft blocks ahead on swing.
mining:
  range: 4.0
  arc-degrees: 45.0
  step-degrees: 15.0
  # Blocks harder than this resist (stone is 1.5, obsidian 50, bedrock -1).
  max-hardness: 3.0

cooldown:
  # Swing cooldown in milliseconds (per player).
  swing-ms: 200
