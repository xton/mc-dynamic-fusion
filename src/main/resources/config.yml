# DynamicFusion configuration.

# Log every fusion attempt (anvil preview/take and /fusion fuse) to the server
# console. Useful for diagnosing; set false to quiet it down.
debug-logging: true

# If non-empty, fusion effects (weapon swings/shots, worn effects, Golden Brush,
# machine glow) only fire in these worlds — elsewhere a fused item just acts
# vanilla. A fused item carried into another world (portal, teleport) keeps its
# modifiers; they simply won't trigger there. Empty (the default) = unrestricted.
allowed-worlds: []

fusion:
  # Maximum modifiers stored on one item. Technical guard on PDC/loop size,
  # not a balance lever — excess is dropped from the tail.
  max-modifiers: 24
  # XP-level cost to fuse. Free to start; raise later to add cost.
  cost: 0

# A weapon = a projectile (flight) + a payload (a list of bursts). Modifiers
# are either EMITTERS (add a burst) or TRANSFORMS (scale/alter the nearest
# preceding one — RPN, apply-to-previous). Nothing is implicit: a shot with no
# emitter delivers no burst.
effect:
  # Whether bursts affect other players (knockback; DAMAGE bursts also hurt).
  affect-players: false
  # Ambient particles shed by a held fused weapon (cosmetic).
  particle-shedding: true
  shed-period-ticks: 4
  # Ambient glow above placed Fusion Machines, so they stand out from a plain
  # enchanting table (cosmetic).
  machine-glow: true
  machine-glow-period-ticks: 15

# Flight defaults every projectile starts from before flight transforms apply.
projectile:
  # Launch speed in blocks/tick for a full-power shot (melee = a short fast bolt).
  base-speed: 1.6
  # Ticks a shot lives before it expires and terminates if it hits nothing.
  # This is the base for a bow (a ranged, arcing shot). LIFETIME lengthens it.
  base-lifetime-ticks: 30
  # Base flight for a melee swing — a short, arm's-length poke that delivers in
  # front of you with no visible trail. High speed + a 1-tick life means the
  # terminus is reached within the first tick (reads as instant, like a swing).
  # Add LIFETIME to throw it downrange.
  melee-lifetime-ticks: 1
  melee-speed: 4.0
  # A piercing shot ghosts through blocks up to this hardness and stops at
  # anything harder (stone is 1.5, obsidian 50, bedrock -1/unbreakable).
  pierce-max-hardness: 3.0

# --- Emitters (add a burst to the payload) ---

# PUSH — a knockback burst. Base size; scale with EXPAND/AMPLIFY.
push:
  radius: 2.0
  power: 1.0        # knockback strength

# DAMAGE — a damaging burst. Base size; scale with EXPAND/AMPLIFY.
damage:
  radius: 2.5
  power: 4.0        # damage in half-hearts (4 = 2 hearts)

# --- AOE transforms (modify the nearest preceding emitter) ---

# EXPAND — multiplies the previous burst's radius; stacks (×N per copy).
expand:
  factor-per-apply: 1.6

# AMPLIFY — multiplies the previous burst's power/damage; stacks (×N per copy).
amplify:
  factor-per-apply: 1.6

# CHAIN — the previous burst hops to more nearby entities; stacks per copy.
chain:
  count-per-apply: 2
  range: 6.0

# PERSIST — the previous burst lingers and re-pulses; stacks duration.
persist:
  ticks-per-apply: 60
  interval-ticks: 20

# --- Flight transforms (modify the projectile) ---

# MULTISHOT — launches extra projectiles per shot; stacks per copy.
multishot:
  count-per-apply: 2

# SPREAD — widens the random aim cone (half-angle in degrees); stacks per copy.
spread:
  degrees-per-apply: 12.0

# PIERCE — passes through soft blocks/entities (no tunables; uses
# projectile.pierce-max-hardness as the cutoff).

# BOUNCE — ricochets off blocks instead of stopping, losing energy each time
# until it settles (or a mob hit / expiry triggers it sooner).
bounce:
  # Fraction of speed kept per bounce (energy loss) — lower settles faster,
  # feels heavier (a dropped rock, not a superball). 1.0 = no loss (never settles).
  restitution: 0.55
  # Extra horizontal drag applied on TOP of restitution when the bounce is off
  # a floor specifically, so it rolls to a stop rather than skating sideways.
  floor-friction: 0.5

# LIFETIME — adds range so a shot flies farther; stacks per copy. Expressed as a
# fixed DISTANCE (blocks), converted to ticks against the shot's speed, so it
# adds the same tunnel length regardless of how fast the weapon fires.
lifetime:
  range-per-apply: 12.0

# MINING — an emitter that carves a tunnel along the flight. It does NOT pierce
# on its own: alone it breaks the block it hits and stops; add PIERCE to bore
# through many and LIFETIME to reach farther. Break hardness uses
# projectile.pierce-max-hardness (stone 1.5, obsidian 50, bedrock -1).
mining:
  # Base tunnel radius. 1.0 = a one-block-wide bore; EXPAND widens it.
  base-radius: 1.0
  # Break-hardness cap of a single MINING (stone 1.5, obsidian 50). Stone breaks,
  # obsidian resists — until you stack MINING.
  base-hardness: 3.0
  # Each EXTRA MINING raises the break-hardness cap by this much, so MINING·MINING
  # chews harder blocks (AMPLIFY scales the same hardness). With base 3 + 15/apply,
  # ~MINING×4 gets through obsidian. Capped by environmental.max-hardness.
  hardness-per-apply: 15.0

# FIRE — an environmental emitter that spreads fire, melts snow/ice, and ignites
# mobs in a radius (a touch wider than MINING). Applied along the flight like
# MINING (terminus, each pierced cell, and — with TRAIL — the air it flies).
fire:
  # Base blaze radius. Slightly larger than the mining bore. EXPAND widens it.
  base-radius: 1.5
  # How long (ticks) a mob the fire touches keeps burning (20 ticks = 1s).
  burn-ticks: 100

# ICE — the inverse of FIRE: freezes water→ice, lava→obsidian, snuffs fire, and
# chills mobs (vanilla powder-snow freeze) in a radius.
ice:
  base-radius: 1.5
  # Freeze ticks applied to a chilled mob (7 ticks/heart of freeze damage once
  # past the mob's freeze threshold; 140 ≈ full freeze effect).
  freeze-ticks: 140

# DEPOSIT:<BLOCK> — an environmental emitter that fills the empty cells in a
# radius with a block. The block is named in the modifier ID (DEPOSIT:DIRT).
deposit:
  base-radius: 1.5

# Shared safety caps for every environmental emitter (FIRE/ICE/MINING/DEPOSIT),
# so EXPAND stacks can't grief the whole world in one shot.
environmental:
  # Hard ceiling on any environmental radius, whatever EXPAND multiplies it to.
  max-radius: 8.0
  # Absolute safety ceiling: no MINING stack, however deep, breaks a block harder
  # than this (bedrock is unbreakable regardless). Obsidian is 50; 100 lets a big
  # MINING stack through it but still blocks nothing vanilla-unbreakable.
  max-hardness: 100.0

# SPAWN — an emitter that launches a fresh child projectile at the terminus.
spawn:
  # How deep SPAWN may nest (generation cap). The launched shot is generation 0,
  # its children 1, and so on; past this a SPAWN simply doesn't fire.
  max-generation: 2

# DETECT — like SPAWN, but the child arms in place (blinking) instead of firing
# immediately, and detonates the moment a creature steps within its radius (a
# trap/mine). Shares SPAWN's max-generation nesting cap.
detect:
  # Base trigger radius; EXPAND (placed right after DETECT) widens it.
  range: 1.5
  # How long (ticks) an armed mine waits before quietly disarming if nothing
  # ever triggers it. 12000 = 10min.
  max-wait-ticks: 12000

# GOLDEN BRUSH — a fused BRUSH with TREASURE (from gold). Brushing any block has
# a chance to cough up loot; more gold (TREASURE level) procs more often and
# unlocks rarer finds.
golden-brush:
  # Proc chance = base + per-level × TREASURE level, clamped to the cap.
  proc-chance-base: 0.15
  proc-chance-per-level: 0.1
  proc-chance-cap: 0.75
  # Per-player cooldown between brush strokes (ms), so it isn't a firehose.
  cooldown-ms: 250

# WORN EFFECTS — fused onto armor and applied while equipped.
worn:
  # How often (ticks) the worn-effect task refreshes (GLOW's glowing outline, etc.).
  effect-period-ticks: 100
  # GLOW's first-person half: Glowing (above) is invisible to the wearer
  # themself (Minecraft never renders your own body in first person), so a
  # client-side-only LIGHT block (packet-based, sent only to the wearer via
  # Player#sendBlockChange — the real world is never touched) is tracked this
  # many blocks in front of their eyes. The client's own lighting engine
  # recomputes real brightness from it, so they actually see better by it —
  # not night vision.
  glow-light-distance: 1.5
  # How often (ticks) that light re-checks/moves to track where they're
  # looking. It's just a packet send (no real relight cost), so this can run
  # every tick for the smoothest tracking the block grid allows.
  glow-light-period-ticks: 1
  # Jetpack (LIFT) — a directional thruster, not an elytra glide: vanilla
  # elytra gliding is blocked outright for a LIFT-fused chestplate/elytra (its
  # own look-tied auto-forward would fight our control scheme), replaced
  # entirely by the tunables below.
  #
  # While airborne and holding jump, vertical velocity ramps up by this much
  # each tick (a smooth rise, not a snap to full speed)...
  jetpack-thrust-per-tick: 0.1
  # ...capped at this vertical velocity (~0.42 is a normal jump's; a gentle
  # hover-climb is slow). A tap-jump from the ground is untouched either way —
  # this only kicks in once the wearer has left the ground. Holding crouch
  # overrides the rise and lets gravity take back over; press jump again to
  # resume climbing.
  jetpack-max-velocity: 0.7
  # Lateral thrust: forward/back/strafe-left/strafe-right (whichever way you're
  # currently facing) nudge your horizontal velocity each tick you hold them —
  # world-space momentum, not look-locked, so turning around doesn't redirect
  # speed you've already built up.
  jetpack-lateral-thrust-per-tick: 0.05
  # Cap on horizontal jetpack speed (blocks/tick).
  jetpack-lateral-max-velocity: 0.6

cooldown:
  # Swing cooldown in milliseconds (per player).
  swing-ms: 200
