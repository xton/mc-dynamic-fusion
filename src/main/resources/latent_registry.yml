# Latent modifier identities for ingredient items.
# Only special/rare items carry latent modifiers; common items contribute nothing.
# Re-fusing stacks modifiers (duplicates are kept), so combining ingredients
# compounds their effects.
latent_modifiers:
  # NOVA — all-directions burst
  NETHER_STAR:
    - NOVA
  # EXPAND — widen the area
  HEART_OF_THE_SEA:
    - EXPAND
  MAGMA_CREAM:
    - EXPAND
  # CHAIN — hop to nearby entities
  STRING:
    - CHAIN
  ECHO_SHARD:
    - CHAIN
  # MULTISHOT — launch extra projectiles
  RABBIT_FOOT:
    - MULTISHOT
  SLIME_BALL:
    - MULTISHOT
  CHORUS_FRUIT:
    - MULTISHOT
  # SPREAD — scatter the aim (shotgun fodder with MULTISHOT)
  FEATHER:
    - SPREAD
  SUGAR:
    - SPREAD
  # PIERCE — punch through blocks and entities
  ARROW:
    - PIERCE
  QUARTZ:
    - PIERCE
  # LIFETIME — longer lifetime / more range
  GUNPOWDER:
    - LIFETIME
  # MINING — short fast piercing ray that carves soft blocks
  AMETHYST_SHARD:
    - MINING
  # INVERT — implode (pull inward) instead of shoving out
  FERMENTED_SPIDER_EYE:
    - INVERT
  # PERSIST — lingering field that keeps pulsing
  BLAZE_ROD:
    - PERSIST
  DRAGON_BREATH:
    - PERSIST
