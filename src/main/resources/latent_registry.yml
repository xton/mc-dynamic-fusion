# Latent modifier identities for ingredient items.
#
# A weapon is a projectile (flight) + a payload (bursts). Modifiers are either
# EMITTERS (PUSH/DAMAGE — add a burst) or TRANSFORMS (scale/alter the nearest
# preceding emitter, or shape the flight). Order matters: transforms apply to
# what came before them (RPN). Re-fusing appends, so you build a weapon by
# adding an emitter, then piling transforms onto it.
#
# Ingredients come in two flavours:
#   * reagents — a single atomic attribute, for composing your own weapons;
#   * bundles  — a curated list (a ready-made "spell"), useful with fewer fusions.
# Only special/rare items carry latents; common items contribute nothing.
latent_modifiers:

  # ---- Emitters (reagents) ----
  NETHER_STAR:            # PUSH
    - PUSH
  PISTON:
    - PUSH
  FIRE_CHARGE:            # DAMAGE
    - DAMAGE
  FLINT:
    - DAMAGE

  # ---- AOE transforms (reagents) ----
  HEART_OF_THE_SEA:       # EXPAND — ×radius
    - EXPAND
  MAGMA_CREAM:
    - EXPAND
  GLOWSTONE_DUST:         # AMPLIFY — ×power/damage
    - AMPLIFY
  BLAZE_POWDER:
    - AMPLIFY
  STRING:                 # CHAIN — hop to more entities
    - CHAIN
  ECHO_SHARD:
    - CHAIN
  FERMENTED_SPIDER_EYE:   # INVERT — implode a push
    - INVERT
  BLAZE_ROD:              # PERSIST — lingering re-pulse
    - PERSIST
  DRAGON_BREATH:
    - PERSIST

  # ---- Flight transforms (reagents) ----
  RABBIT_FOOT:            # MULTISHOT — extra projectiles
    - MULTISHOT
  SLIME_BALL:
    - MULTISHOT
  FEATHER:                # SPREAD — scatter the aim
    - SPREAD
  SUGAR:
    - SPREAD
  ARROW:                  # PIERCE — punch through
    - PIERCE
  QUARTZ:
    - PIERCE
  GUNPOWDER:              # LIFETIME — fly farther
    - LIFETIME
  REDSTONE:
    - LIFETIME
  AMETHYST_SHARD:         # MINING — short piercing mining ray
    - MINING

  # ---- Environmental emitters (reagents) ----
  FLINT_AND_STEEL:        # FIRE — spread fire, melt snow/ice, ignite mobs
    - FIRE
  LAVA_BUCKET:            # DEPOSIT:LAVA — pour a lava splash (also a fire source)
    - DEPOSIT:LAVA
  BLUE_ICE:               # ICE — freeze water, harden lava, chill mobs
    - ICE
  PACKED_ICE:
    - ICE
  SNOWBALL:
    - ICE
  DIRT:                   # DEPOSIT:DIRT — raise a dirt mound
    - DEPOSIT:DIRT
  SAND:                   # DEPOSIT:SAND — drop suffocating sand
    - DEPOSIT:SAND
  GRAVEL:
    - DEPOSIT:GRAVEL
  WATER_BUCKET:           # DEPOSIT:WATER — splash of water
    - DEPOSIT:WATER
  COBWEB:                 # DEPOSIT:COBWEB — snare the area
    - DEPOSIT:COBWEB

  # ---- Structural (reagents) ----
  ENDER_PEARL:            # TELEPORT — warp to where the shot lands
    - TELEPORT
  ENDER_EYE:
    - TELEPORT
  FIREWORK_ROCKET:        # SPAWN — burst into fresh child projectiles
    - SPAWN
  EGG:
    - SPAWN
  TRIDENT:                # TRAIL — leave an environmental wake
    - TRAIL
  PRISMARINE_SHARD:
    - TRAIL

  # ---- Bundles (curated multi-attribute "spells") ----
  TNT:                    # a big boom
    - DAMAGE
    - EXPAND
    - EXPAND
  FIREWORK_STAR:          # flak: a damaging spray
    - DAMAGE
    - MULTISHOT
    - SPREAD
  WITHER_SKELETON_SKULL:  # a hard-hitting sniper bolt
    - DAMAGE
    - AMPLIFY
    - AMPLIFY
  GHAST_TEAR:             # a repelling zone
    - PUSH
    - EXPAND
    - PERSIST
  WIND_CHARGE:            # gusts — a wide shove volley
    - PUSH
    - MULTISHOT
    - SPREAD
  HONEY_BLOCK:            # a vacuum that drags things in
    - PUSH
    - INVERT
  SHULKER_SHELL:          # a bouncing shove that chains
    - PUSH
    - CHAIN
  SPECTRAL_ARROW:         # a piercing lance
    - PIERCE
    - LIFETIME
  CRYING_OBSIDIAN:        # a boring damage beam
    - DAMAGE
    - PIERCE
    - LIFETIME
  PHANTOM_MEMBRANE:       # a long, scattering flight
    - LIFETIME
    - SPREAD
  CHORUS_FRUIT:           # a chaotic multishot spray
    - MULTISHOT
    - SPREAD
  DRAGON_HEAD:            # a devastating wide blast
    - DAMAGE
    - EXPAND
    - AMPLIFY
  END_CRYSTAL:            # everything, because OP is welcome
    - DAMAGE
    - EXPAND
    - AMPLIFY
    - PERSIST
  MAGMA_BLOCK:            # a boring flamethrower — tunnels and torches
    - FIRE
    - PIERCE
    - LIFETIME
  BLAZE_SPAWN_EGG:        # a cluster firebomb: bursts into fiery children
    - DAMAGE
    - SPAWN
    - MULTISHOT
    - SPREAD
    - FIRE
  MUD:                    # a block-replacement bolt (carve, then backfill)
    - MINING
    - PIERCE
    - DEPOSIT:DIRT
  POWDER_SNOW_BUCKET:     # a freezing lance that leaves an icy wake
    - ICE
    - PIERCE
    - TRAIL
  CHORUS_FLOWER:          # a piercing blink to the end of the tunnel
    - PIERCE
    - LIFETIME
    - TELEPORT
