name: DynamicFusion
version: '${version}'
main: com.xton.fusion.FusionPlugin
api-version: '26.1.2'
description: Noita-style emergent fusion weapons.
author: xton
commands:
  fuse:
    description: Fuse your main-hand weapon (Target) with your off-hand item (Ingredient).
    usage: /fuse
  fusion:
    description: DynamicFusion admin command (e.g. get a Fusion Machine).
    usage: /fusion machine
